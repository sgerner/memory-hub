services:
  obsidian-worker:
    build: .
    container_name: obsidian-worker
    restart: unless-stopped
    environment:
      - AGENTMEMORY_URL=${AGENTMEMORY_URL:-http://agentmemory:3111}
      - AGENTMEMORY_TOKEN=${AGENTMEMORY_TOKEN:?Set AGENTMEMORY_TOKEN in .env}
      - SLEEP_INTERVAL=${OBSIDIAN_SLEEP_INTERVAL:-60}
    volumes:
      - ${MEMORY_DATA_DIR:?Set MEMORY_DATA_DIR in .env}/obsidian-worker:/app/config
      - ${MEMORY_DATA_DIR:?Set MEMORY_DATA_DIR in .env}/settings/obsidian.json:/app/config/settings.json:ro
      - ${MEMORY_DATA_DIR:?Set MEMORY_DATA_DIR in .env}/status:/app/status
      - ${MEMORY_OBSIDIAN_DIR:?Set MEMORY_OBSIDIAN_DIR in .env}:/data/obsidian:ro
    networks:
      - memory-internal
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  memory-internal:
    driver: bridge
