services:
  docs-worker:
    build: .
    container_name: docs-worker
    restart: unless-stopped
    environment:
      - AGENTMEMORY_URL=http://agentmemory:3111
      - AGENTMEMORY_TOKEN=${AGENTMEMORY_TOKEN:?Set AGENTMEMORY_TOKEN in .env}
      - SLEEP_INTERVAL=300
    volumes:
      - /home/skynet/opt/appdata/memory-hub/docs-worker:/app/config
      - /home/skynet/opt/appdata/memory-hub/settings/documents.json:/app/config/settings.json:ro
      - /home/skynet/opt/appdata/memory-hub/status:/app/status
      - /home/skynet/data/ingest:/data/ingest:ro,rslave
    networks:
      - memory-internal
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  memory-internal:
    external: true
