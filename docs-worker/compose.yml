services:
  docs-worker:
    build: .
    container_name: docs-worker
    restart: unless-stopped
    environment:
      - AGENTMEMORY_URL=${AGENTMEMORY_URL:-http://agentmemory:3111}
      - AGENTMEMORY_TOKEN=${AGENTMEMORY_TOKEN:?Set AGENTMEMORY_TOKEN in .env}
      - SLEEP_INTERVAL=${DOCS_SLEEP_INTERVAL:-300}
    volumes:
      - ${MEMORY_DATA_DIR:?Set MEMORY_DATA_DIR in .env}/docs-worker:/app/config
      - ${MEMORY_DATA_DIR:?Set MEMORY_DATA_DIR in .env}/settings/documents.json:/app/config/settings.json:ro
      - ${MEMORY_DATA_DIR:?Set MEMORY_DATA_DIR in .env}/status:/app/status
      - ${MEMORY_INGEST_DIR:?Set MEMORY_INGEST_DIR in .env}:/data/ingest:ro,rslave
    networks:
      - memory-internal
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  memory-internal:
    driver: bridge
