services:
  github-worker:
    build: .
    container_name: github-worker
    restart: unless-stopped
    environment:
      - AGENTMEMORY_URL=${AGENTMEMORY_URL:-http://agentmemory:3111}
      - AGENTMEMORY_TOKEN=${AGENTMEMORY_TOKEN:?Set AGENTMEMORY_TOKEN in .env}
      - GITHUB_USERNAME=${GITHUB_USERNAME:?Set GITHUB_USERNAME in .env}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - SLEEP_INTERVAL=${GITHUB_SLEEP_INTERVAL:-3600}
      - SECRETS_PATH=/app/shared-settings/secrets.json
    volumes:
      - ${MEMORY_DATA_DIR:?Set MEMORY_DATA_DIR in .env}/github-worker:/app/config
      - ${MEMORY_DATA_DIR:?Set MEMORY_DATA_DIR in .env}/settings/github.json:/app/config/settings.json:ro
      - ${MEMORY_DATA_DIR:?Set MEMORY_DATA_DIR in .env}/settings:/app/shared-settings:ro
      - ${MEMORY_DATA_DIR:?Set MEMORY_DATA_DIR in .env}/status:/app/status
    networks:
      - memory-internal
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  memory-internal:
    external: true
