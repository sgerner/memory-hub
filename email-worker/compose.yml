services:
  email-worker:
    build: .
    container_name: email-worker
    restart: unless-stopped
    environment:
      - AGENTMEMORY_URL=http://agentmemory:3111
      - AGENTMEMORY_TOKEN=${AGENTMEMORY_TOKEN:?Set AGENTMEMORY_TOKEN in .env}
      - BATCH_SIZE=2000
      - SLEEP_INTERVAL=60
    volumes:
      - /home/skynet/opt/appdata/memory-hub/email-worker:/app/config
      - /home/skynet/opt/appdata/memory-hub/settings/email.json:/app/config/settings.json:ro
      - /home/skynet/opt/appdata/memory-hub/status:/app/status
    networks:
      - memory-internal
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  memory-internal:
    external: true
